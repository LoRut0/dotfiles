bindsym --to-code {
    Super+n splith
    Super+v splitv
# Exit sway (logs you out of your Wayland session)
    $mod+Shift+q exec swaymsg exit
# Launch and kill
    $mod+q exec $term
    $mod+r exec $menu
    # $mod+Shift+c kill
    $mod+c kill
# Move your focus around
    $mod+h focus left
    $mod+j focus down
    $mod+k focus up
    $mod+l focus right
    $mod+Shift+h move left
    $mod+Shift+j move down
    $mod+Shift+k move up
    $mod+Shift+l move right
    $mod+Control+H move workspace to output left
    $mod+Control+L move workspace to output right
    $mod+Shift+Space floating toggle
# Custom apps
    $mod+b exec $browser
    $mod+e exec $explorer
    $mod+t exec $telegram
#
# workspaces:
#
# switch to workspace
    $mod+1 workspace 1
    $mod+2 workspace 2
    $mod+3 workspace 3
    $mod+4 workspace 4
    $mod+5 workspace 5
    $mod+6 workspace 6
    $mod+7 workspace 7
    $mod+8 workspace 8
    $mod+9 workspace 9
    $mod+0 workspace 10
# Move focused container to workspace
    $mod+Shift+1 move container to workspace 1
    $mod+Shift+2 move container to workspace 2
    $mod+Shift+3 move container to workspace 3
    $mod+Shift+4 move container to workspace 4
    $mod+Shift+5 move container to workspace 5
    $mod+Shift+6 move container to workspace 6
    $mod+Shift+7 move container to workspace 7
    $mod+Shift+8 move container to workspace 8
    $mod+Shift+9 move container to workspace 9
    $mod+Shift+0 move container to workspace 10
}


bindsym --locked $mod+l exec $lock_cmd
bindsym --locked $mod+shift+l exec $suspend_cmd

bindsym --locked XF86MonBrightnessUp exec $brightness_up
bindsym --locked XF86MonBrightnessDown exec $brightness_down
bindsym --locked XF86AudioRaiseVolume exec $volume_up
bindsym --locked XF86AudioLowerVolume exec $volume_down
bindsym --locked XF86AudioMute exec $toggle_mute
bindsym --locked XF86AudioMicMute exec $toggle_mic_mute
bindsym --locked XF86Display exec $display_config
bindsym --locked Print exec $screenshot

